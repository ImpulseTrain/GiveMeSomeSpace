<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css" />
    <title>Vue.js</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script> <!-- including the Vue.js library from a CDN -->
</head>

<body>
    <div id="app">
        <main>
            <div class="topnav">
                <a href="index.html">
                    <img src="./assets/logo.svg" class="logo" alt="logo">
                </a>
                <div class="nav-links">
                    <a class="active" href="#home">Home</a>
                    <a href="#news">News</a>
                    <a href="#gallery">Gallery</a>
                    <a href="#contact">Contact</a>
                </div>
            </div>
            <!-- separator line that is flush with the topnav -->
            <hr>

            <div class="card-container">
                <a href="#launch" class="card">
                    <span>Launch</span>
                    <img src="./assets/launch.svg" class="launch-logo" alt="launch-logo">
                    <img src="./assets/launch2.svg" class="launch-logo-hover" alt="launch-logo-hover">    
                </a>
                <a href="#events" class="card">
                    Events
                </a>
            </div>
        </main>
    </div>
    <script>
        const {createApp, ref} = Vue //importing createApp and ref from Vue
        createApp(
            {
                setup() {
                    const name = ref("Tests") //creating a reactive variable 'name' with initial value "Tests"
                    const emoji = ref("😂")
                    const sentence = ref("Meow says the cow!")
                    const clicks = ref(0) //creating a reactive variable 'clicks' with initial value 0
                    const handleClick =  () => {
                        clicks.value++ //incrementing the value of 'clicks' when the button is clicked
                    }
                    const resetClicks = () => {
                        clicks.value = 0 //resetting the value of 'clicks' to 0 when the reset button is clicked
                    }
                    const go_to_next = () => {
                        window.location.href = "page2.html"
                    }
                    return {name, emoji, sentence, clicks, handleClick, resetClicks, go_to_next} //returning the reactive variables to be used in the template
                }
            }
        ).mount("#app") //mounting the Vue application to the DOM element with id "app"
    </script>
</body>
